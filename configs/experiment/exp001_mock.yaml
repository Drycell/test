experiment:
  name: exp001_mock
  mode: structure_only
  connectome_mode: mock
env:
  episode_seconds: 8.0
  physics_dt: 0.001
  control_dt: 0.01
  start_height: 0.01
  start_forward_speed: 0.05
  crash_height: 0.002
  max_tilt_deg: 75
  wind_gust_std: 0.0
  body_length_m: 0.01
  body_radius_m: 0.0005
  wing_span_m: 0.004
  wing_chord_m: 0.0008
  air_density: 1.225
controller:
  type: ctrnn
  tau_init: 1.0
  bias_init: 0.0
  use_virtual_nodes: true
evolution:
  population_size: 32
  elite_count: 4
  generations: 40
  max_edits: 8
  train_eval_seeds: [0,1,2,3]
  final_eval_seeds: [0,1,2,3,4,5,6,7]
  new_edge_values: [-1.0, -0.5, 0.5, 1.0]
  edit_penalty: 0.05
logging:
  save_video: false
  save_trajectories: true
  save_graph_exports: true
seeds:
  master_seed: 123
