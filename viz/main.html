<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WormWing Viz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>WormWing Run Visualizer</h1>
    <div class="grid">
      <section>
        <h2>Run summary</h2>
        <pre id="summary"></pre>
      </section>
      <section>
        <h2>Fitness curve</h2>
        <canvas id="fitness" width="520" height="220"></canvas>
      </section>
      <section>
        <h2>Trajectory scrubber</h2>
        <input type="range" id="step" min="0" max="0" value="0" />
        <pre id="frame"></pre>
      </section>
    </div>
    <script src="vis.js"></script>
  </body>
</html>
